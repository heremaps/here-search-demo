# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, release/* ]
  schedule:
    - cron: "0 8 * * *"

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      # https://github.com/astral-sh/setup-uv
      # https://github.com/codecov/codecov-action
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Test
        run: |
          for version in 3.11 3.12 3.13; do
            uv run --python "$version" --extra dev pytest -n auto -vv tests --ignore=tests/test_notebooks.py
          done

      - name: Lint
        run: |
          uv run --python 3.13 --extra dev ruff check src tests jupyterlite_build
          uv run --python 3.13 --extra dev ruff format src tests jupyterlite_build --check

      - name: Coverage
        run: |
          uv run --python 3.13 --extra dev pytest -v --cov=src tests --ignore=tests/test_notebooks.py --cov-report=xml --cov-report=term-missing

      - name: Upload to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  pages-build:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/mamba-org/setup-micromamba
      # https://github.com/actions/upload-pages-artifact
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3

      - name: Create page
        run: |
          uv run --active jupyterlite_build/xeus.sh
          uv run --active sphinx-build -b html docs/ workspace/public/docs
          ls -la
          ls -la workspace
          mv workspace/public .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: pages-build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/deploy-pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
